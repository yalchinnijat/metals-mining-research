name: Refresh data and republish

on:
  schedule:
    - cron: "30 22 * * 1-5"   # weekdays 22:30 UTC = after U.S. market close
  workflow_dispatch:           # allows manual "Run workflow" button on GitHub

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python metals_engine.py
        working-directory: 02-data-engine
      - name: Commit refreshed data
        run: |
          git config user.name "data-refresh-bot"
          git config user.email "actions@github.com"
          git add docs/data.js 02-data-engine/comps_workbook.xlsx
          git diff --cached --quiet || git commit -m "Automated data refresh"
          git push
